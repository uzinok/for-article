<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <style>
    .checkbox-view {
      display: inline-block;
      width: 20px;
      height: 20px;
      border-radius: 2px;
      border: 2px solid currentColor;
    }

    .radio-view {
      display: inline-block;
      width: 20px;
      height: 20px;
      border-radius: 8px;
      border: 2px solid currentColor;
    }

    .checkbox-view {
      position: relative;
    }

    .checkbox:checked+.checkbox-view::before {
      content: '';
      position: absolute;
      width: 5px;
      height: 14px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(25deg);
      left: 6px;
      top: 1px;
    }

    .radio-view {
      position: relative;
    }

    .radio:checked+.radio-view::before {
      content: '';
      position: absolute;
      background-color: currentColor;
      width: 10px;
      height: 10px;
      border-radius: 5px;
      top: 5px;
      left: 5px;
    }

    .label:hover .checkbox-view:not(:active),
    .label:hover .radio-view:not(:active) {
      opacity: 0.7;
    }

.checkbox:focus-visible+.checkbox-view,
.radio:focus-visible+.radio-view {
  outline: 2px solid #000000;
  outline-offset: 2px;
}

    .checkbox-view:active,
    .radio-view:active {
      color: #d52b1e;
    }

    .visually-hidden {
      position: absolute;
      width: 0;
      height: 0;
      margin: 0;
      padding: 0;
      overflow: hidden;
      border: none;
    }
  </style>
  <label class="label">
    <input type="checkbox" class="checkbox visually-hidden" name="name" id="checkbox-1" checked>
    <span class="checkbox-view"></span>
    Кнопка 1
  </label>
  <label class="label">
    <input type="checkbox" class="checkbox visually-hidden" name="name" id="checkbox-2">
    <span class="checkbox-view"></span>
    Кнопка 2
  </label>

  <label class="label">
    <input type="radio" class="radio visually-hidden" name="name" id="radio-1" checked>
    <span class="radio-view"></span>
    Кнопка 3
  </label>
  <label class="label">
    <input type="radio" class="radio visually-hidden" name="name" id="radio-2">
    <span class="radio-view"></span>
    Кнопка 4
  </label>

</body>

</html>
