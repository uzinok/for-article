  <div class="block-2">
    <style>
      .visually-hidden {
        position: absolute;
        width: 0;
        height: 0;
        margin: 0;
        padding: 0;
        overflow: hidden;
        border: none;
      }

      .radio-view,
      .checkbox-view {
        display: inline-block;
        width: 16px;
        height: 16px;
        vertical-align: baseline;
        position: relative;
        color: #2D3440;
      }

      .radio-view::before,
      .checkbox-view::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        mask-image: url(./img/input.svg);
        -webkit-mask-image: url(./img/input.svg);
        mask-position: center;
        -webkit-mask-position: center;
        mask-repeat: no-repeat;
        -webkit-mask-repeat: no-repeat;
        mask-size: contain;
        -webkit-mask-size: contain;
        background-color: currentColor;
      }

      .checkbox-view::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        mask-image: url(./img/input-checked.svg);
        -webkit-mask-image: url(./img/input-checked.svg);
        mask-position: center;
        -webkit-mask-position: center;
        mask-repeat: no-repeat;
        -webkit-mask-repeat: no-repeat;
        mask-size: contain;
        -webkit-mask-size: contain;
        background-color: currentColor;
        opacity: 0;
      }

      .checkbox-view::after,
      .checkbox-view::before {
        transition: opacity 0.25s ease-in-out;
      }

      .checkbox:checked+.checkbox-view::before {
        opacity: 0;
      }

      .checkbox:checked+.checkbox-view::after {
        opacity: 1;
      }

      .radio-view::after {
        content: '';
        display: block;
        width: 6px;
        height: 6px;
        background-color: currentColor;
        border-radius: 2px;
        margin: 5px;
        opacity: 0;
        transition: opacity 0.25s ease-in-out;
      }

      .radio:checked+.radio-view::after {
        opacity: 1;
      }

      .label:hover .checkbox:not(:disabled):not(:active)+.checkbox-view,
      .label:hover .radio:not(:disabled):not(:active)+.radio-view {
        color: blue;
      }

      .checkbox-view::before,
      .checkbox-view::after,
      .radio-view::before,
      .radio-view::after {
        transition: opacity 0.25s ease-in-out, color 0.25s ease-in-out;
      }

.checkbox:not(:disabled)+.checkbox-view:active,
.radio:not(:disabled)+.radio-view:active {
  color: red;
}

.checkbox:focus-visible+.checkbox-view,
.radio:focus-visible+.radio-view {
  outline: auto;
}

.checkbox:disabled+.checkbox-view,
.radio:disabled+.radio-view {
  opacity: 0.4;
}
    </style>
    <label class="label">
      <input type="checkbox" class="checkbox visually-hidden" name="name" checked>
      <span class="checkbox-view"></span>
      Кнопка 1
    </label>
    <label class="label">
      <input type="checkbox" class="checkbox visually-hidden" name="name">

    <label class="label">

    <label class="label">
