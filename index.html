<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>progress/meter</title>
	<link rel="stylesheet" href="/css/style.css">
	<link rel="stylesheet" href="./css/style-meter.css">
</head>

<body>

	<div>
		<label for="progress" class="progress-label">Загружено:</label>
		<progress id="progress" value="70" max="100"> 70% </progress>
	</div>

	<div>
		<label for="meter" class="meter-label">Шоколада:</label>
		<meter id="meter" min="0" max="100" low="33" high="66" optimum="80" value="90">90/100</meter>
	</div>

</body>

</html>
