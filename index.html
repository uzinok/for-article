<body>

<blockquote class="blockquote blockquote-circle">
	<p class="blockquote-text">Ученик, который учится без желания, — это птица без крыльев.</p>
	<footer class="blockquote-footer">— Саади</footer>
</blockquote>

<blockquote class="blockquote blockquote-rhomb">
	<p class="blockquote-text">Тот, кто не желает учиться, — никогда не станет настоящим человеком.</p>
	<footer class="blockquote-footer">— Хосе Хулиан Марти</footer>
</blockquote>
