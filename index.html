<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>progress/meter</title>
	<link rel="stylesheet" href="/css/style.css">
	<link rel="stylesheet" href="./css/style-meter.css">
	<style>
		body {
			font-family: Arial, Helvetica, sans-serif;
			font-size: 20px;
			margin: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			flex-direction: column;
		}

		div:first-child {
			margin-bottom: 20px;
		}
	</style>
</head>

<body>

	<div>
		<label for="progress" class="progress-label">Загружено:</label>
		<progress id="progress" value="70" max="100"> 70% </progress>
	</div>

	<div>
		<label for="meter" class="meter-label">Шоколада:</label>
		<meter id="meter" min="0" max="100" low="33" high="66" optimum="80" value="90"></meter>
	</div>

</body>

</html>
