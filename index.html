<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>progress/meter</title>
	<link rel="stylesheet" href="/css/style.css">
	<link rel="stylesheet" href="./css/style-meter.css">
	<style>
		body {
			font-family: Arial, Helvetica, sans-serif;
			font-size: 20px;
			margin: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			flex-direction: column;
			text-align: center;
		}

		.bg,
		.con {
			width: 800px;
		}

		.bg {
			background-color: rgb(71, 80, 255);
			height: 50px;
		}

		.con {
			padding: 40px;
		}

		.con p {
			margin: 0 0 20px;
		}

		.con p:first-child {
			font-size: 2em;
		}

		.con button {
			background-color: #1A3E3E;
			color: aliceblue;
			border: 0;
			padding: 5px 10px;
			font-family: inherit;
			font-size: 1.3em;
		}
	</style>
</head>

<body>

	<div class="bg"></div>
	<div class="con">
		<p>Заголовок</p>
		<p>Описание</p>
		<button>Кнопка</button>
	</div>
	<div class="bg"></div>

</body>

</html>
