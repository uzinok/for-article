<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		body {
			font-family: Arial, Helvetica, sans-serif;
			font-size: 20px;
			margin: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			flex-direction: column;
			/* text-align: center; */
		}

		.com {
			display: grid;
			outline: 1px solid;
			padding: 16px;
			width: 800px;
		}

		p:first-child {
			display: flex;
		}

		p {
			margin-top: 0;
		}

li:not(:last-child) {
	margin-right: 16px;
}

		p img {
			display: block;
			width: 50px;
			height: 50px;
			font-size: 10px;
			border: 1px solid;
		}

		.com > img {
			width: 200px;
			height: 300px;
			display: block;
			border: 1px solid;
			margin-bottom: 16px;
		}

		button {
			width: fit-content;
			margin-left: auto;
		}
	</style>
</head>

<body>

	<div class="com">
		<p>
			<img src="./" alt="Аватарка">
			<span>Имя</span>
		</p>
		<p>Текст комментария</p>
		<img src="" alt="фотография комментария">
		<button>лайк 13</button>
	</div>

</body>

</html>
