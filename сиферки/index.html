<!-- <svg viewBox="0 0 200 100" style="width: auto;">
	<path id="digit-path" stroke="blue" stroke-width="2" fill="none" d="M 0,50 C 50,20 150,80 200,50"></path>
</svg>

<script>
	const path = document.getElementById('digit-path');
	const frames = [
		'M 0,50 C 50,20 150,80 200,50',
		'M 0,50 C 50,50 150,50 200,50',
		'M 0,50 C 50,80 150,20 200,50',
		'M 0,50 C 50,50 150,50 200,50',
		'M 0,50 C 50,20 150,80 200,50'
	];

	// Преобразуем строки в массивы чисел для удобства интерполяции
	function parsePath(d) {
		const nums = d.match(/[0-9.-]+/g).map(Number);
		return {
			x0: nums[0],
			y0: nums[1],
			x1: nums[2],
			y1: nums[3],
			x2: nums[4],
			y2: nums[5],
			x3: nums[6],
			y3: nums[7]
		};
	}

	function interpolatePoints(p1, p2, t) {
		return {
			x0: p1.x0 + (p2.x0 - p1.x0) * t,
			y0: p1.y0 + (p2.y0 - p1.y0) * t,
			x1: p1.x1 + (p2.x1 - p1.x1) * t,
			y1: p1.y1 + (p2.y1 - p1.y1) * t,
			x2: p1.x2 + (p2.x2 - p1.x2) * t,
			y2: p1.y2 + (p2.y2 - p1.y2) * t,
			x3: p1.x3 + (p2.x3 - p1.x3) * t,
			y3: p1.y3 + (p2.y3 - p1.y3) * t,
		};
	}

	function formatPath(p) {
		return `M ${p.x0},${p.y0} C ${p.x1},${p.y1} ${p.x2},${p.y2} ${p.x3},${p.y3}`;
	}

	const frameObjects = frames.map(parsePath);
	const numFrames = frameObjects.length;
	const duration = 5000; // 5 секунд на цикл
	let startTime = null;

	function animate(timestamp) {
		if (!startTime) startTime = timestamp;
		const elapsed = (timestamp - startTime) % duration; // 0 … duration
		const progress = elapsed / duration; // 0 … 1

		// Определяем два соседних ключевых кадра и локальный прогресс между ними
		const totalSegments = numFrames; // число сегментов = число кадров (циклически)
		const segmentLength = 1 / totalSegments; // длина одного сегмента в прогрессе
		const segmentIndex = Math.floor(progress / segmentLength); // индекс первого кадра в сегменте
		const t = (progress - segmentIndex * segmentLength) / segmentLength; // локальный t 0..1

		const i1 = segmentIndex;
		const i2 = (segmentIndex + 1) % numFrames; // следующий кадр (с замыканием)

		const p1 = frameObjects[i1];
		const p2 = frameObjects[i2];
		const currentPoint = interpolatePoints(p1, p2, t);

		path.setAttribute('d', formatPath(currentPoint));

		requestAnimationFrame(animate);
	}
	requestAnimationFrame(animate);
</script> -->
