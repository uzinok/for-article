	<!-- Подключаем Flubber (без зависимостей) -->
	<!-- <script src="https://unpkg.com/flubber@0.3.0"></script> -->
	<script>
		(function () {
			const startD =
				"M41.32 112.5q-36.48 0-36.47-32.41Q5.28 45.15 39 45.15q33.84 1.32 33.07 36.04-2.96 30.21-30.54 31.31l-2.09-11.1Q60 100.41 61.1 80.86q.43-25.27-22.42-27.03Q15.4 55.15 15.4 78.44q2.2 22.41 24.06 22.96Z";
			const endD =
				"M26.76 112.5q-4.83 0-4.83-2.97 0-2.63 4.83-2.63 6.26 0 6.26-5.28v-45.8q0-6.27-5.93-6.27-5.16 0-5.16-2.42 0-3.3 5.16-3.3h26.15q5.16 0 5.16 3.08 0 2.64-5.16 2.64-5.27 0-5.27 6.48l-.11 45.04q.1 5.83 5.7 5.83 4.4 0 4.4 2.63 0 2.97-4.28 2.97Z";

			const path = document.getElementById('myPath');
			const svg = document.getElementById("mySvg");

			// Создаём интерполятор с помощью Flubber
			const interpolator = flubber.interpolate(startD, endD, {
				maxSegmentLength: 0.1
			});

			let animFrame = null;
			let startTime = null;
			const duration = 800; // длительность анимации в мс
			let direction = 1; // 1 → к endD, -1 → к startD

			// Функция анимации
			function animate(timestamp) {
				if (!startTime) startTime = timestamp;
				const elapsed = timestamp - startTime;
				let progress = Math.min(elapsed / duration, 1);

				// Учитываем направление (вперёд/назад)
				if (direction === -1) progress = 1 - progress;

				// Простой easeInOut для плавности
				const eased = progress < 0.5 ?
					2 * progress * progress :
					1 - Math.pow(-2 * progress + 2, 2) / 2;

				// Получаем промежуточный путь и применяем его
				path.setAttribute('d', interpolator(eased));

				if (elapsed < duration) {
					animFrame = requestAnimationFrame(animate);
				} else {
					// По окончании ставим точный конечный путь
					const finalD = direction === 1 ? endD : startD;
					path.setAttribute('d', finalD);
					animFrame = null;
				}
			}

			// Запуск анимации в нужном направлении
			function startAnimation(dir) {
				if (animFrame) cancelAnimationFrame(animFrame);
				direction = dir;
				startTime = null;
				animFrame = requestAnimationFrame(animate);
			}

			// Обработчики наведения
			svg.addEventListener('mouseenter', () => startAnimation(1));
			svg.addEventListener('mouseleave', () => startAnimation(-1));
		})();
	</script>

		<svg viewBox="0 0 200 19" xmlns="http://www.w3.org/2000/svg">
			<path class="wave-2" d="M0 10c80-25 160 25 200 0" stroke="black" stroke-width="1" fill="none" />
		</svg>
	</div>
	<script>
		(function () {
			// Функция для анимации одного элемента
			function animateWave(element, duration = 5000) {
				// Отключаем CSS-анимацию, если она была задана
				element.style.animation = 'none';
				// Можно также сохранить прозрачность из CSS, если нужно
				// element.style.opacity = '0.5';

				// Ключевые кадры (аналогичны CSS)
				const keyframes = [{
						time: 0,
						d: "M0 10c50-25 150 25 200 0"
					},
					{
						time: 0.25,
						d: "M0 10c50 0 150 0 200 0"
					},
					{
						time: 0.5,
						d: "M0 10c50 25 150 -25 200 0"
					},
					{
						time: 0.75,
						d: "M0 10c50 0 150 0 200 0"
					},
					{
						time: 1,
						d: "M0 10c50-25 150 25 200 0"
					}
				];

				// Извлекаем числа из каждого ключевого кадра
				const parsedFrames = keyframes.map(frame => ({
					time: frame.time,
					numbers: frame.d.match(/-?\d+\.?\d*/g).map(Number)
				}));

				// Запоминаем время старта анимации
				const startTime = performance.now();

				// Функция обновления кадра
				function updateFrame() {
					const now = performance.now();
					const elapsed = (now - startTime) % duration; // циклическое время
					const progress = elapsed / duration; // прогресс от 0 до 1

					// Находим два ключевых кадра, между которыми находится progress
					let i = 0;
					while (i < parsedFrames.length - 1 && parsedFrames[i + 1].time < progress) {
						i++;
					}
					const frameA = parsedFrames[i];
					const frameB = parsedFrames[i + 1];

					// Коэффициент интерполяции между кадрами
					const factor = (progress - frameA.time) / (frameB.time - frameA.time);

					// Линейная интерполяция каждого числового значения
					const interpolated = frameA.numbers.map((val, idx) =>
						val + factor * (frameB.numbers[idx] - val)
					);

					// Собираем строку атрибута d
					// Формат: Mx y c ... (сохраняем первые два числа для M)
					const d = `M${interpolated[0]} ${interpolated[1]}c${interpolated.slice(2).join(' ')}`;
					element.setAttribute('d', d);

					// Запрашиваем следующий кадр
					requestAnimationFrame(updateFrame);
				}

				// Запускаем анимацию
				requestAnimationFrame(updateFrame);
			}

			// Ждём полной загрузки DOM
			document.addEventListener('DOMContentLoaded', () => {
				// Находим все элементы с классом wave
				const waves = document.querySelectorAll('.wave');
				waves.forEach(el => animateWave(el));
			});
		})();
	</script>
