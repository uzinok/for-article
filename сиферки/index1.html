<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
<style>
	html {
		height: 100%;
	}
	body {
		height: 500%;
	}

	svg {
		position: fixed;
		top: 50%;
		left: 50%;
		transform: translate(-50%, -50%);
		border: 1px solid;
	}

	.clip {
		transform: translateY(100%);
		animation: progress linear;
		animation-timeline: scroll();
	}

	@keyframes progress {
		to {
			transform: translateY(0);
		}
	}
</style>
</head>
<body>
<svg width="200" height="200" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">
	<defs>
		<clipPath id="clip" class="clip">
			<path d="M0,24 L24,24 L24,0 c -6,3 -18,-3 -24,0 Z">
				<animate attributeName="d" values="
					M0,24 L24,24 L24,0 c -6,3 -18,-3 -24,0 Z;
					M0,24 L24,24 L24,0 c -6,-3 -18,3 -24,0 Z;
					M0,24 L24,24 L24,0 c -6,0 -18,0 -24,0 Z;
					M0,24 L24,24 L24,0 c -6,-3 -18,3 -24,0 Z;
					M0,24 L24,24 L24,0 c -6,3 -18,-3 -24,0 Z"
					dur="2.5s" repeatCount="indefinite" calcMode="linear" keyTimes="0; 0.25; 0.5; 0.75; 1" />
			</path>
		</clipPath>
	</defs>
	<path d="M6.25.5c-1.52 0-2.99.68-4.07 1.89A7 7 0 0 0 .5 6.94c0 2.84 1.03 9.54 10.93 16.37q.57.37 1.14 0C22.48 16.48 23.5 9.78 23.5 6.94c0-1.7-.6-3.34-1.68-4.55A5.5 5.5 0 0 0 17.75.5C14.53.5 12 4.37 12 4.37S9.47.5 6.25.5" fill="red" clip-path="url(#clip)"/>
	<path d="M6.25.5c-1.52 0-2.99.68-4.07 1.89A7 7 0 0 0 .5 6.94c0 2.84 1.03 9.54 10.93 16.37q.57.37 1.14 0C22.48 16.48 23.5 9.78 23.5 6.94c0-1.7-.6-3.34-1.68-4.55A5.5 5.5 0 0 0 17.75.5C14.53.5 12 4.37 12 4.37S9.47.5 6.25.5" stroke="black" stroke-width="0.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</body>
</html>
